<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raspa y Gana Oficial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f172a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .titulo {
            font-size: 24px;
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitulo {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        /* --- TARJETA RASPA Y GANA --- */
        .contenedor-raspa {
            position: relative;
            width: 300px;
            height: 180px;
            background: #1e293b;
            border-radius: 20px;
            border: 4px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        /* Brillo legendario si toca Robux */
        .brillo-robux {
            animation: bordeNeon 1s infinite alternate;
        }

        @keyframes bordeNeon {
            0% { border-color: #00fff0; box-shadow: 0 0 15px #00fff0; }
            50% { border-color: #ff007f; box-shadow: 0 0 25px #ff007f; }
            100% { border-color: #ffaa00; box-shadow: 0 0 15px #ffaa00; }
        }

        .premio-oculto {
            text-align: center;
            padding: 20px;
        }

        .premio-texto {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa00;
            margin-top: 5px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
            touch-action: none;
            border-radius: 14px;
            z-index: 5;
        }

        /* --- SELLO DE FIRMA DE ALEX --- */
        .firma-alex {
            margin-top: 30px;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 26px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: -1px;
            font-weight: bold;
        }

        /* --- BLOQUEO FIJO --- */
        .contenedor-bloqueo {
            display: none;
            background: #1e293b;
            border: 2px solid #ff3366;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .indicacion-alex {
            font-size: 18px;
            font-weight: bold;
            color: #00fff0;
            background: #0f172a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px dashed #00fff0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- Interfaz Activa de Juego -->
    <div id="interfaz-juego" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <h1 class="titulo">Raspa y Gana</h1>
        <p class="subtitulo">Pasa tu dedo por el cuadro gris para revelar tu premio</p>

        <div class="contenedor-raspa" id="tarjeta-tarjeta">
            <!-- Texto del Premio Fijo de fondo -->
            <div class="premio-oculto">
                <div style="font-size: 40px;">🎁</div>
                <div class="premio-texto" id="texto-ganado">Premio</div>
            </div>
            <!-- Capa gris para raspar -->
            <canvas id="capa-gris" width="292" height="172"></canvas>
        </div>
    </div>

    <!-- Interfaz Bloqueada -->
    <div class="contenedor-bloqueo" id="interfaz-bloqueo">
        <h2 style="color: #ff3366; margin-top: 0; font-size: 22px;">¡Tarjeta Raspada!</h2>
        <p style="color: #ccc; font-size: 15px; margin-bottom: 5px;">Tu premio asignado fue:</p>
        <div id="recompensa-texto" style="font-size: 19px; font-weight: bold; color: #ffaa00; margin: 10px 0;"></div>
        <div class="indicacion-alex">quita una cap y mándaselo a Alex y reclama tu premio</div>
    </div>

    <!-- Sello/Firma junta de Alex -->
    <div class="firma-alex">Alex.</div>

    <script>
        const juegoContenedor = document.getElementById("interfaz-juego");
        const bloqueoContenedor = document.getElementById("interfaz-bloqueo");
        const tarjeta = document.getElementById("tarjeta-tarjeta");
        const textoGanado = document.getElementById("texto-ganado");
        const canvas = document.getElementById("capa-gris");
        const ctx = canvas.getContext("2d");

        let rasgando = false;
        let premioAsignado = null;

        const premios = [
            { nombre: "2 regalos pequeños 🎁", esRobux: false, prob: 0.50 },
            { nombre: "100 Bucks de saldo 💰", esRobux: false, prob: 0.30 },
            { nombre: "200 Bucks de saldo 💵", esRobux: false, prob: 0.10 },
            { nombre: "350 Bucks de saldo 💳", esRobux: false, prob: 0.08 },
            { nombre: "500 Bucks de saldo 🧳", esRobux: false, prob: 0.019 },
            { nombre: "10 ROBUX 💎", esRobux: true, prob: 0.001 }
        ];

        window.onload = function() {
            if (localStorage.getItem("raspaJuegoAbierto") === "true") {
                activarBloqueo();
            } else {
                // Primero: Pintamos la capa gris obligatoriamente para que cargue al instante
                pintarCapaGris();
                // Segundo: Calculamos el premio de fondo de inmediato
                calcularPremioSecreto();
            }
        };

        function activarBloqueo() {
            juegoContenedor.style.display = "none";
            const premioGuardado = localStorage.getItem("premioRaspaGanado") || "Premio Registrado";
            document.getElementById("recompensa-texto").innerText = premioGuardado;
            bloqueoContenedor.style.display = "block";
        }

        function pintarCapaGris() {
            ctx.fillStyle = "#555b6e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "bold 15px Arial";
            ctx.textAlign = "center";
            ctx.fillText("RASPA AQUÍ CON EL DEDO", canvas.width / 2, canvas.height / 2 + 5);

            // Activar lectores de dedos y mouse
            canvas.addEventListener("touchstart", empiezarRaspar);
            canvas.addEventListener("touchmove", rasparMovimiento);
            canvas.addEventListener("touchend", pararRaspar);
            canvas.addEventListener("mousedown", empiezarRaspar);
            canvas.addEventListener("mousemove", rasparMovimiento);
            canvas.addEventListener("mouseup", pararRaspar);
        }

        function calcularPremioSecreto() {
            const azar = Math.random();
            let suma = 0;
            premioAsignado = premios[premios.length - 1];

            for (let p of premios) {
                suma += p.prob;
                if (azar <= suma) {
                    premioAsignado = p;
                    break;
                }
            }

            textoGanado.innerText = premioAsignado.nombre;

            if (premioAsignado.esRobux) {
                tarjeta.classList.add("brillo-robux");
            }
        }

        function empiezarRaspar(e) {
            rasgando = true;
            rasparMovimiento(e);
        }

        function pararRaspar() {
            rasgando = false;
            verificarPorcentajeRaspado();
        }

        function rasparMovimiento(e) {
            if (!rasgando) return;
            e.preventDefault();

            let clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            let clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let rect = canvas.getBoundingClientRect();
            let x = clienteX - rect.left;
            let y = clienteY - rect.top;

            ctx.globalCompositeOperation = "destination-out";
            ctx.beginPath();
            ctx.arc(x, y, 22, 0, Math.PI * 2); // Un poco más grande el círculo para raspar mejor
            ctx.fill();
        }

        function verificarPorcentajeRaspado() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let pixeles = imageData.data;
            let transparentes = 0;

            for (let i = 3; i < pixeles.length; i += 4) {
                if (pixeles[i] === 0) transparentes++;
            }

            let porcentaje = (transparentes / (canvas.width * canvas.height)) * 100;

            // Al raspar un 35% ya detecta que terminaste para no forzar al usuario
            if (porcentaje > 35) {
                canvas.style.pointerEvents = "none";
                canvas.style.transition = "opacity 0.4s ease";
                canvas.style.opacity = 0;

                setTimeout(() => {
                    localStorage.setItem("raspaJuegoAbierto", "true");
                    localStorage.setItem("premioRaspaGanado", premioAsignado.nombre);
                    activarBloqueo();
                }, 1000);
            }
        }
    </script>
</body>
  </html>
